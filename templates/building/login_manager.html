<!DOCTYPE html>
<html lang="fa" dir="rtl" class="text-[18px]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب‌کتاب | ورود مدیران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden p-6 md:p-8">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-50 text-blue-600 rounded-xl text-xl mb-3">
                🔑
            </div>
            <h1 class="text-xl font-bold text-slate-800">ورود مدیران ساختمان</h1>
            <p class="text-xs text-slate-400 mt-2">برای مدیریت واحدها و هزینه‌ها وارد حساب خود شوید</p>
        </div>

        <form method="post" action="" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-xs font-bold text-slate-700 mb-2">نام کاربری</label>
                <input 
                    type="text" 
                    id="username"
                    name="username" 
                    placeholder="نام کاربری خود را وارد کنید" 
                    required
                    class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition duration-150 text-left font-mono"
                    dir="ltr"
                >
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-slate-700 mb-2">رمز عبور</label>
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    placeholder="••••••••" 
                    required
                    class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition duration-150 text-left font-mono"
                    dir="ltr"
                >
            </div>

            <div class="pt-2">
                <button 
                    type="submit" 
                    class="w-full bg-slate-950 hover:bg-slate-800 text-white text-sm font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-slate-950/10 transition duration-150 cursor-pointer"
                >
                    بررسی و ورود
                </button>
            </div>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-500">
                هنوز حسابی نساخته‌اید؟ 
                <a href="{% url 'signup_manager' %}" class="text-blue-600 hover:text-blue-700 font-bold transition duration-150 mr-1">
                    ثبت‌نام مدیر جدید
                </a>
            </p>
        </div>

    </div>

    <a href="/" class="mt-4 text-xs text-slate-400 hover:text-slate-600 transition duration-150 flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
        <span>بازگشت به صفحه اصلی</span>
    </a>

</body>
</html>
