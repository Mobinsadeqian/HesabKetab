<!DOCTYPE html>
<html lang="fa" dir="rtl" class="text-[18px]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب‌کتاب | ویرایش اطلاعات مدیر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100 space-y-6">
        
        <div class="flex items-center gap-3 pb-4 border-b border-slate-100">
            <span class="p-2.5 bg-blue-600 rounded-xl text-xl text-white">⚙️</span>
            <div>
                <h1 class="text-xl font-bold text-slate-900">ویرایش پروفایل مدیریتی</h1>
                <p class="text-xs text-slate-500 mt-1">اطلاعات کاربری و مالی خود را بروزرسانی کنید</p>
            </div>
        </div>

        <form method="post" action="{% url 'update_manager_info' manager.manager_id %}" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">نام</label>
                    <input type="text" name="manager_first_name" value="{{ manager.first_name }}" required
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">نام خانوادگی</label>
                    <input type="text" name="manager_last_name" value="{{ manager.last_name }}" required
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">نام کاربری</label>
                    <input type="text" name="manager_username" value="{{ manager.username }}" required
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-left font-mono focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">رمز عبور جدید (اختیاری)</label>
                    <input type="password" name="manager_password" placeholder="تنها در صورت تغییر وارد کنید"
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-left focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">شماره تلفن</label>
                    <input type="text" name="manager_phone_number" value="{{ manager.phone_number }}" required
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-left font-mono focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">شماره کارت واریز شارژ</label>
                    <input type="text" name="manager_card_number" value="{{ manager.card_number }}" required
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-left font-mono tracking-wide focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition">
                </div>
            </div>

            <div class="flex gap-3 pt-4 border-t border-slate-100">
                <button type="submit" class="flex-1 bg-slate-950 hover:bg-slate-800 text-white font-semibold py-3 px-4 rounded-xl transition text-sm cursor-pointer text-center">
                    ذخیره تغییرات مجتمع
                </button>
                <a href="{% url 'manager_dashboard' %}" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-3 px-6 rounded-xl transition text-sm text-center">
                    انصراف
                </a>
            </div>
        </form>
    </div>

</body>
</html>
